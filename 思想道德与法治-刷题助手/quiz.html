", "text": "民族资本主义"}], "answer": "ABC"}, {"id": 365, "number": 365, "chapter": "第三章", "type": "多选题", "difficulty": "易", "question": "在两岸关系大局稳定的基础上，双方应该为深化（）等领域合作采取更多积极举措，提供更多政策支持，创造更加便利的条件，共同推动两岸关系和平发展、推进祖国和平统一进程。", "options": [{"label": "A", "text": "经济"}, {"label": "B", "text": "科技"}, {"label": "C", "text": "文化"}, {"label": "D", "text": "教育"}], "answer": "ABCD"}, {"id": 366, "number": 366, "chapter": "第三章", "type": "多选题", "difficulty": "易", "question": "两岸同胞血脉相连，是血浓于水的一家人，有着（），这是推动两岸相互理解、携手同心、一起前进的重要力量。", "options": [{"label": "A", "text": "共同的血脉"}, {"label": "B", "text": "共同的文化"}, {"label": "C", "text": "共同的连结"}, {"label": "D", "text": "共同的愿景"}], "answer": "ABCD"}, {"id": 367, "number": 367, "chapter": "第三章", "type": "多选题", "difficulty": "易", "question": "要牢固树立正确的（），增强对伟大祖国的认同、对中华民族的认同、对中华文化的认同、对中国共产党的认同、对中国特色社会主义道路的认同，构建各民族共有精神家园。", "options": [{"label": "A", "text": "祖国观"}, {"label": "B", "text": "民族观"}, {"label": "C", "text": "文化观"}, {"label": "D", "text": "历史观"}], "answer": "ABCD"}, {"id": 368, "number": 368, "chapter": "第三章", "type": "多选题", "difficulty": "易", "question": "在与各民族同胞接触交往的日常生活中，要（），不说伤害民族感情的话，不做不利于民族团结和社会稳定的事。", "options": [{"label": "A", "text": "维护和发展各民族的平等团结互助和谐关系"}, {"label": "B", "text": "尊重兄弟民族的传统文化、风俗习惯和宗教信仰"}, {"label": "C", "text": "多说有利于民族团结、有利于社会稳定的话"}, {"label": "D", "text": "多做有利于民族团结、有利于社会稳定的事"}], "answer": "ABCD"}, {"id": 369, "number": 369, "chapter": "第三章", "type": "多选题", "difficulty": "中", "question": "确立总体国家安全观，必须（）。", "options": [{"label": "A", "text": "既重视外部安全，又重视内部安全"}, {"label": "B", "text": "既重视国土安全，又重视国民安全"}, {"label": "C", "text": "既重视传统安全，又重视非传统安全"}, {"label": "D", "text": "既重视发展问题，又重视安全问题"}], "answer": "ABCD"}, {"id": 370, "number": 370, "chapter": "第三章", "type": "多选题", "difficulty": "中", "question": "在国家安全形势越来越复杂的今天，大学生要（），维护国家安全。", "options": [{"label": "A", "text": "增强国家安全意识"}, {"label": "B", "text": "对境内外敌对势力的渗透、颠覆、破坏活动保持高度警惕"}, {"label": "C", "text": "切实履行维护国家安全的义务"}, {"label": "D", "text": "国家安全与大学生无关"}], "answer": "ABC"}, {"id": 371, "number": 371, "chapter": "第三章", "type": "多选题", "difficulty": "易", "question": "共同建设一个（）、清洁美丽的世界，是全人类的共同利益和共同价值追求。", "options": [{"label": "A", "text": "持久和平"}, {"label": "B", "text": "普遍安全"}, {"label": "C", "text": "共同繁荣"}, {"label": "D", "text": "开放包容"}], "answer": "ABCD"}, {"id": 372, "number": 372, "chapter": "第三章", "type": "多选题", "difficulty": "易", "question": "坚持总体国家安全观，要以人民安全为宗旨，（），走出一条中国特色国家安全道路。", "options": [{"label": "A", "text": "以政治安全为根本"}, {"label": "B", "text": "以经济安全为基础"}, {"label": "C", "text": "以军事科技文化社会安全为保障"}, {"label": "D", "text": "以促进国际安全为依托"}], "answer": "ABCD"}, {"id": 373, "number": 373, "chapter": "第三章", "type": "多选题", "difficulty": "易", "question": "当代中国，爱国主义的本质就是坚持（）高度统一。", "options": [{"label": "A", "text": "爱国"}, {"label": "B", "text": "爱党"}, {"label": "C", "text": "爱社会主义"}, {"label": "D", "text": "爱资本主义"}], "answer": "ABC"}, {"id": 374, "number": 374, "chapter": "第三章", "type": "多选题", "difficulty": "易", "question": "我们爱的“国”是中国共产党领导的社会主义中国，（），为国家繁荣发展贡献自己的力量，是爱国主义的基本要求。", "options": [{"label": "A", "text": "拥护国家的基本制度"}, {"label": "B", "text": "遵守国家的宪法法律"}, {"label": "C", "text": "维护国家安全和统一"}, {"label": "D", "text": "捍卫国家的利益"}], "answer": "ABCD"}, {"id": 375, "number": 375, "chapter": "第三章", "type": "多选题", "difficulty": "中", "question": "“台独”分裂行径（），必然走向彻底失败。", "options": [{"label": "A", "text": "损害国家主权、领土完整"}, {"label": "B", "text": "破坏台海和平稳定"}, {"label": "C", "text": "挑动两岸对抗紧张"}, {"label": "D", "text": "损害两岸同胞共同利益"}], "answer": "ABCD"}, {"id": 376, "number": 376, "chapter": "第三章", "type": "多选题", "difficulty": "易", "question": "多民族是我国的一大特色，各民族共同创造了悠久的中国历史、灿烂的中华文化，造就了我国各民族在（），形成了你中有我、我中有你，谁也离不开谁的多元一体格局。", "options": [{"label": "A", "text": "分布上的交错杂居"}, {"label": "B", "text": "文化上的兼收并蓄"}, {"label": "C", "text": "经济上的相互依存"}, {"label": "D", "text": "情感上的相互亲近"}], "answer": "ABCD"}, {"id": 377, "number": 377, "chapter": "第三章", "type": "多选题", "difficulty": "易", "question": "要认清“藏独”和“疆独”等各种分裂主义势力的险恶用心和反动本质，要（），与破坏民族团结的行为作坚决斗争。", "options": [{"label": "A", "text": "坚持原则、明辨是非"}, {"label": "B", "text": "不信谣、不传谣"}, {"label": "C", "text": "不受分裂分子挑拨煽动"}, {"label": "D", "text": "不参与违法犯罪活动"}], "answer": "ABCD"}, {"id": 378, "number": 378, "chapter": "第三章", "type": "多选题", "difficulty": "易", "question": "中华文化独一无二的（），增添了中国人民和中华民族内心深处的自信和自豪。", "options": [{"label": "A", "text": "理念"}, {"label": "B", "text": "智慧"}, {"label": "C", "text": "气度"}, {"label": "D", "text": "神韵"}], "answer": "ABCD"}, {"id": 379, "number": 379, "chapter": "第三章", "type": "多选题", "difficulty": "中", "question": "当前，世界百年未有之大变局加速演进，（）等全球性问题加剧，世界进入新的动荡变革期。", "options": [{"label": "A", "text": "世纪疫情影响深远，逆全球化思潮抬头"}, {"label": "B", "text": "单边主义、保护主义明显上升"}, {"label": "C", "text": "世界经济复苏乏力"}, {"label": "D", "text": "局部冲突和动荡频发"}], "answer": "ABCD"}, {"id": 380, "number": 380, "chapter": "第三章", "type": "多选题", "difficulty": "中", "question": "大学生既是社会主义现代化建设的有用人才，也是国防建设的后备人才，必须（），成为既能建设祖国又能保卫祖国的优秀人才。", "options": [{"label": "A", "text": "具有很强的国防观念和忧患意识"}, {"label": "B", "text": "自觉接受国防和军事方面的教育训练"}, {"label": "C", "text": "关心国防、了解国防、热爱国防、投身国防"}, {"label": "D", "text": "积极履行国防义务"}], "answer": "ABCD"}, {"id": 381, "number": 381, "chapter": "第三章", "type": "多选题", "difficulty": "易", "question": "改革开放创造的奇迹是来自中国共产党和中国人民的（）以及各方面创新。", "options": [{"label": "A", "text": "理论创新"}, {"label": "B", "text": "实践创新"}, {"label": "C", "text": "制度创新"}, {"label": "D", "text": "文化创新"}], "answer": "ABCD"}, {"id": 382, "number": 382, "chapter": "第三章", "type": "多选题", "difficulty": "中", "question": "虽然我国经济总量跃居世界第二，但大而不强、臃肿虚胖体弱问题相当突出，主要体现在（）。", "options": [{"label": "A", "text": "创新能力不强"}, {"label": "B", "text": "科技发展水平总体不高"}, {"label": "C", "text": "科技对经济社会发展的支撑能力不足"}, {"label": "D", "text": "科技对经济增长的贡献率远低于发达国家水平"}], "answer": "ABCD"}, {"id": 383, "number": 383, "chapter": "第三章", "type": "多选题", "difficulty": "中", "question": "在新一轮科技革命和产业变革中，我国能否在未来发展中后来居上、弯道超车，主要就看能否在创新驱动发展上迈出实实在在的步伐。我们必须（）。", "options": [{"label": "A", "text": "坚持科技是第一生产力、人才是第一资源、创新是第一动力"}, {"label": "B", "text": "深入实施科教兴国战略、人才强国战略、创新驱动发展战略"}, {"label": "C", "text": "开辟发展新领域新赛道"}, {"label": "D", "text": "不断塑造发展新动能新优势"}], "answer": "ABCD"}, {"id": 384, "number": 384, "chapter": "第三章", "type": "多选题", "difficulty": "易", "question": "只有全面深化改革，坚持创新在我国现代化建设全局中的核心地位，在全社会积极营造鼓励（）的良好氛围，才能把创新驱动的新引擎全速发动起来，为我国经济社会发展提供前所未有的强劲动力。", "options": [{"label": "A", "text": "大胆创新"}, {"label": "B", "text": "勇于创新"}, {"label": "C", "text": "包容创新"}, {"label": "D", "text": "盲目创新"}], "answer": "ABC"}, {"id": 385, "number": 385, "chapter": "第三章", "type": "多选题", "difficulty": "易", "question": "青年时期是创新创造的宝贵时期。新时代的大学生置身于实现中华民族伟大复兴的时代洪流之中，应当（）。", "options": [{"label": "A", "text": "树立改革创新的自觉意识"}, {"label": "B", "text": "增强改革创新的能力本领"}, {"label": "C", "text": "勇做改革创新的实践者"}, {"label": "D", "text": "将弘扬改革创新精神贯穿于实践中、体现在行动上"}], "answer": "ABCD"}, {"id": 386, "number": 386, "chapter": "第三章", "type": "多选题", "difficulty": "易", "question": "树立改革创新的自觉意识，要求大学生要（）。", "options": [{"label": "A", "text": "增强改革创新的责任感"}, {"label": "B", "text": "树立敢于突破陈规的意识"}, {"label": "C", "text": "树立大胆探索未知领域的信心"}, {"label": "D", "text": "直面实践中遇到的困难，锐意进取，奋力前行"}], "answer": "ABCD"}, {"id": 387, "number": 387, "chapter": "第三章", "type": "多选题", "difficulty": "易", "question": "树立敢于突破陈规的意识，要求大学生在学习与实践中要（）。", "options": [{"label": "A", "text": "敢于大胆突破陈规甚至常规"}, {"label": "B", "text": "敢于大胆探索尝试"}, {"label": "C", "text": "善于观察发现、思考批判"}, {"label": "D", "text": "不唯书、不唯上、只唯实"}], "answer": "ABCD"}, {"id": 388, "number": 388, "chapter": "第三章", "type": "多选题", "difficulty": "易", "question": "大学生应当在全面深化改革的伟大实践中（），勇做改革创新的实践者和生力军。", "options": [{"label": "A", "text": "发扬改革创新精神"}, {"label": "B", "text": "增强改革创新的意识"}, {"label": "C", "text": "锤炼改革创新的意志"}, {"label": "D", "text": "提高改革创新的能力"}], "answer": "ABCD"}, {"id": 389, "number": 389, "chapter": "第三章", "type": "多选题", "difficulty": "易", "question": "大学生富有想象力和创造力，是改革创新的生力军，要在改革创新的实践中（），让改革创新成为青春远航的强大动力。", "options": [{"label": "A", "text": "奉献祖国"}, {"label": "B", "text": "服务人民"}, {"label": "C", "text": "实现价值"}, {"label": "D", "text": "循规蹈矩"}], "answer": "ABC"}, {"id": 390, "number": 390, "chapter": "第三章", "type": "多选题", "difficulty": "易", "question": "大学生在专业学习与社会实践中应（），自觉培养创新思维。", "options": [{"label": "A", "text": "只唯书、只唯上"}, {"label": "B", "text": "勤于思考"}, {"label": "C", "text": "善于发现"}, {"label": "D", "text": "勇于创新"}], "answer": "BCD"}, {"id": 391, "number": 391, "chapter": "第三章", "type": "多选题", "difficulty": "易", "question": "青年往往（），敢于尝试新生事物，这些都是有利于创新创造的重要条件。", "options": [{"label": "A", "text": "朝气蓬勃"}, {"label": "B", "text": "思维活跃"}, {"label": "C", "text": "好奇心强"}, {"label": "D", "text": "求知欲盛"}], "answer": "ABCD"}, {"id": 392, "number": 392, "chapter": "第三章", "type": "判断题", "difficulty": "中", "question": "中国精神作为兴国强国之魂，是实现中华民族伟大复兴不可或缺的精神支撑。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 393, "number": 393, "chapter": "第三章", "type": "判断题", "difficulty": "易", "question": "中国历史上许多仁人志士重视人生境界和理想人格，这些理想人格虽时代不同、类型有别，但其共同点是关注人的精神品格。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 394, "number": 394, "chapter": "第三章", "type": "判断题", "difficulty": "中", "question": "对品格养成的重视是中华民族崇尚精神的优秀传统的表现之一。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 395, "number": 395, "chapter": "第三章", "type": "判断题", "difficulty": "中", "question": "今天，中国人民比历史上任何时期都更接近、更有信心和能力实现中华民族伟大复兴。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 396, "number": 396, "chapter": "第三章", "type": "判断题", "difficulty": "中", "question": "弘扬中国精神，对于维系中华民族的生存与发展、维护国家统一和民族团结发挥着重要的凝聚作用。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 397, "number": 397, "chapter": "第三章", "type": "判断题", "difficulty": "中", "question": "爱祖国的大好河山，只需要爱祖国的自然风光。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "错误"}, {"id": 398, "number": 398, "chapter": "第三章", "type": "判断题", "difficulty": "中", "question": "维护祖国领土的完整和统一，是每个人的神圣使命和义不容辞的责任。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 399, "number": 399, "chapter": "第三章", "type": "判断题", "difficulty": "易", "question": "中华文明历来把人的精神生活纳入人生和社会理想之中。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 400, "number": 400, "chapter": "第三章", "type": "判断题", "difficulty": "易", "question": "古代思想家们不仅对道德修养和道德教化理论进行了系统论述，而且提出了修身养性的具体方法以及家箴家训、乡规民约等教化方式。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 401, "number": 401, "chapter": "第三章", "type": "判断题", "difficulty": "易", "question": "在几千年历史长河中，中国人民始终团结一心、同舟共济，建立了统一的多民族国家，发展了56个民族多元一体、交织交融的融洽民族关系，形成了守望相助的中华民族大家庭。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 402, "number": 402, "chapter": "第三章", "type": "判断题", "difficulty": "易", "question": "中国人民从亲身经历中深刻认识到，团结就是力量，团结才能前进，一个四分五裂的国家不可能发展进步。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 403, "number": 403, "chapter": "第三章", "type": "判断题", "difficulty": "易", "question": "当前，我们正在从事的中国特色社会主义事业是一项前无古人的创造性事业，中国精神作为兴国强国之魂的价值和意义更为凸显。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 404, "number": 404, "chapter": "第三章", "type": "判断题", "difficulty": "易", "question": "世界上没有一个民族能够亦步亦趋走别人的道路实现自己的发展振兴，也没有一个民族会在心神不定、游移彷徨中成就自己的光荣和梦想。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 405, "number": 405, "chapter": "第三章", "type": "判断题", "difficulty": "难", "question": "国家是个体成长发展的基本屏障和坚实依托，个体与国家之间相互依存、密不可分，这也是最深刻的爱国理由。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 406, "number": 406, "chapter": "第三章", "type": "判断题", "difficulty": "易", "question": "以爱国主义为核心的民族精神，为中国人民克服艰难险阻、实现中华民族伟大复兴提供了不竭的精神力量。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 407, "number": 407, "chapter": "第三章", "type": "判断题", "difficulty": "易", "question": "以爱国主义为核心的民族精神和以改革创新为核心的时代精神紧密关联，都是中华民族赖以生存和发展的精神支撑，都是中国精神的重要组成部分。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 408, "number": 408, "chapter": "第三章", "type": "判断题", "difficulty": "易", "question": "大学生是民族的希望和祖国的未来，要努力将中国精神转化为青春行动，勇做弘扬和践行中国精神的时代先锋，为国家富强、民族振兴、人民幸福贡献自己的智慧和力量。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 409, "number": 409, "chapter": "第三章", "type": "判断题", "difficulty": "易", "question": "在现阶段，爱国主义主要表现为在中国共产党领导下，献身于建设新时代中国特色社会主义伟大事业，献身于实现中华民族伟大复兴的中国梦的实践，献身于促进祖国统一大业。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 410, "number": 410, "chapter": "第三章", "type": "判断题", "difficulty": "易", "question": "不同历史时期的爱国主义虽然内涵和表现方式有所不同，但本质上是爱国爱党爱社会主义的高度统一，都统一于实现中华民族伟大复兴的中国梦的鲜活实践之中。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 411, "number": 411, "chapter": "第三章", "type": "判断题", "difficulty": "易", "question": "爱国，不能停留在口号上，而是要把自己的理想同祖国的前途、民族的命运紧密联系在一起。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 412, "number": 412, "chapter": "第三章", "type": "判断题", "difficulty": "易", "question": "推进祖国统一，必须保持香港、澳门长期繁荣稳定。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 413, "number": 413, "chapter": "第三章", "type": "判断题", "difficulty": "易", "question": "“一国两制”是中国特色社会主义的伟大创举，是香港、澳门回归后保持长期繁荣稳定的最佳制度安排，必须长期坚持。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 414, "number": 414, "chapter": "第三章", "type": "判断题", "difficulty": "易", "question": "解决台湾问题、实现祖国完全统一，要坚持贯彻新时代党解决台湾问题的总体方略，牢牢把握两岸关系主导权和主动权，坚定不移推进祖国统一大业。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 415, "number": 415, "chapter": "第三章", "type": "判断题", "difficulty": "易", "question": "凡是有利于增进两岸同胞共同福祉的事情，我们都应尽最大努力做好。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 416, "number": 416, "chapter": "第三章", "type": "判断题", "difficulty": "易", "question": "一切分裂祖国的活动都必将遭到全体中国人坚决反对。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 417, "number": 417, "chapter": "第三章", "type": "判断题", "difficulty": "易", "question": "大学生要感悟两岸关系和平发展的潮流，担当起实现中华民族伟大复兴的历史重任，为推动两岸关系和平发展、实现祖国统一作出自己的贡献。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 418, "number": 418, "chapter": "第三章", "type": "判断题", "difficulty": "易", "question": "中华优秀传统文化是中华民族的精神命脉，其中蕴含着中华民族世世代代形成和积累的思想营养和实践智慧，是中华民族得以延续的文化基因，也是我们在世界文化激荡中站稳脚跟的根基。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 419, "number": 419, "chapter": "第三章", "type": "判断题", "difficulty": "易", "question": "我们要对中华民族的英雄心怀崇敬，自觉传承好中华民族辉煌灿烂的历史文化。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 420, "number": 420, "chapter": "第三章", "type": "判断题", "difficulty": "易", "question": "国家安全是指一个国家不受内部和外部的威胁、破坏而保持稳定有序的状态。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 421, "number": 421, "chapter": "第三章", "type": "判断题", "difficulty": "易", "question": "新时代爱国主义继承并发扬了中华文化协和万邦、热爱和平的优秀传统，对外主张平等互利、和平共处的国际交往原则，积极维护国际和平与文明和谐。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 422, "number": 422, "chapter": "第三章", "type": "判断题", "difficulty": "易", "question": "新中国是中国共产党领导的社会主义国家，祖国的命运和党的命运、社会主义的命运密不可分。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 423, "number": 423, "chapter": "第三章", "type": "判断题", "difficulty": "易", "question": "爱国主义与爱社会主义的统一是中国历史发展的必然结果。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 424, "number": 424, "chapter": "第三章", "type": "判断题", "difficulty": "易", "question": "新时代大学生不仅要在认识上深刻理解爱国爱党爱社会主义的高度统一，更要以实际行动体现对祖国的热爱、对党的热爱、对社会主义的热爱。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 425, "number": 425, "chapter": "第三章", "type": "判断题", "difficulty": "易", "question": "大陆和台湾同属一个中国，是不可分割的整体，这个事实从未改变，也不可能改变。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 426, "number": 426, "chapter": "第三章", "type": "判断题", "difficulty": "易", "question": "我们绝不允许任何人、任何组织、任何政党在任何时候、以任何形式、把任何一块中国领土从中国分裂出去。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 427, "number": 427, "chapter": "第三章", "type": "判断题", "difficulty": "易", "question": "处理好民族问题、促进民族团结，是关系祖国统一和边疆巩固的大事，是关系民族团结和社会稳定的大事，是关系国家长治久安和中华民族繁荣昌盛的大事。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 428, "number": 428, "chapter": "第三章", "type": "判断题", "difficulty": "易", "question": "对祖国悠久历史、深厚文化的理解和接受，是培育和发展爱国主义情感的重要条件。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 429, "number": 429, "chapter": "第三章", "type": "判断题", "difficulty": "易", "question": "一个抛弃了或者背叛了自己历史文化的民族，不仅不可能发展起来,而且很可能上演一场历史悲剧。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 430, "number": 430, "chapter": "第三章", "type": "判断题", "difficulty": "易", "question": "一个有希望的民族不能没有英雄，一个有前途的国家不能没有先锋。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 431, "number": 431, "chapter": "第三章", "type": "判断题", "difficulty": "易", "question": "世界是丰富多彩的，不能以一个或几个国家的政治制度、价值观念和意识形态来衡量多样性的世界。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 432, "number": 432, "chapter": "第三章", "type": "判断题", "difficulty": "难", "question": "用一种政治制度、价值观念和意识形态去统一世界，不仅是对别国的侵害，而且也是根本行不通的，只会危害世界的和平与发展。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 433, "number": 433, "chapter": "第三章", "type": "判断题", "difficulty": "中", "question": "保卫祖国、抵抗侵略是军人的职责，与普通大学生无关。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "错误"}, {"id": 434, "number": 434, "chapter": "第三章", "type": "判断题", "difficulty": "中", "question": "大学生只需要遵守国家安全法律即可，无需履行维护国家安全的法律义务。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "错误"}, {"id": 435, "number": 435, "chapter": "第三章", "type": "判断题", "difficulty": "易", "question": "中国人民的梦想同各国人民的梦想息息相通，实现中国梦离不开和平的国际环境和稳定的国际秩序。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 436, "number": 436, "chapter": "第三章", "type": "判断题", "difficulty": "易", "question": "社会主义在中国不是一句空洞的口号，而是集中代表着、体现着、实现着国家、民族和人民的根本利益。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 437, "number": 437, "chapter": "第三章", "type": "判断题", "difficulty": "易", "question": "中国的问题必须从中国基本国情出发，由中国人自己来解答。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 438, "number": 438, "chapter": "第三章", "type": "判断题", "difficulty": "易", "question": "改革开放是当代中国发展进步的活力之源，它只有进行时，没有完成时。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 439, "number": 439, "chapter": "第三章", "type": "判断题", "difficulty": "易", "question": "创新是推动人类社会发展的重要力量。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 440, "number": 440, "chapter": "第三章", "type": "判断题", "difficulty": "易", "question": "创新决定着世界政治经济力量对比的变化，也决定着各国各民族的前途命运。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 441, "number": 441, "chapter": "第三章", "type": "判断题", "difficulty": "易", "question": "大学生要以时不我待、只争朝夕的紧迫感投身改革创新的实践，服务人民，奉献社会，实现人生价值。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 442, "number": 442, "chapter": "第三章", "type": "判断题", "difficulty": "易", "question": "青年应是常为新、敢创造的,理当锐意创新创造，不等待、不观望、不懈怠，勇做改革创新的生力军。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 443, "number": 443, "chapter": "第三章", "type": "判断题", "difficulty": "中", "question": "无视或轻视专业知识学习，不可能担负改革创新的重任。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 444, "number": 444, "chapter": "第三章", "type": "判断题", "difficulty": "中", "question": "大学生作为改革创新的生力军，应从扎实系统的专业知识学习起步和入手，而不能好高鸯远，空谈改革创新。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 445, "number": 445, "chapter": "第三章", "type": "判断题", "difficulty": "易", "question": "大学生应当珍惜人生中最具创新创造活力的宝贵时期，有敢为人先、开拓进取的锐气，有逢山开路、遇河架桥的意志，在创新创造中不断积累经验、取得成果、演绎精彩。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 446, "number": 446, "chapter": "第三章", "type": "判断题", "difficulty": "易", "question": "改革创新是当代中国最突出、最鲜明的特点。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 447, "number": 447, "chapter": "第三章", "type": "判断题", "difficulty": "易", "question": "中国特色社会主义之所以具有蓬勃生命力，就在于它是实行改革开放的社会主义。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 448, "number": 448, "chapter": "第三章", "type": "判断题", "difficulty": "易", "question": "在当代中国，经济社会发展离不开改革创新。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 449, "number": 449, "chapter": "第三章", "type": "判断题", "difficulty": "易", "question": "第二次产业革命以来，美国占据了世界第一的位置，这是因为美国是科技和产业革命的领航者和最大获利者。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 450, "number": 450, "chapter": "第三章", "type": "判断题", "difficulty": "易", "question": "21世纪以来,全球科技创新进入空前密集活跃的时期，谁在创新上先行一步，谁就能拥有引领发展的主动权。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 451, "number": 451, "chapter": "第三章", "type": "判断题", "difficulty": "易", "question": "面对科技创新和产业革命新趋势，世界主要国家都在积极调整应对，努力寻找创新的突破口，抢占发展的先机，纷纷出台新的创新战略，加大投入，加强人才、专利、标准等战略性创新资源争夺，创新战略竞争在综合国力竞争中的地位日益重要。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 452, "number": 452, "chapter": "第三章", "type": "判断题", "difficulty": "易", "question": "改革创新充满艰辛、奉献甚至牺牲，没有强烈的责任感，很难克服和战胜改革创新过程中的艰难曲折。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 453, "number": 453, "chapter": "第三章", "type": "判断题", "difficulty": "易", "question": "要创新，就要有强烈的创新意识，凡事要有打破砂锅问到底的劲头，敢于质疑现有定论，勇于开拓新的方向，攻坚克难，追求卓越。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 454, "number": 454, "chapter": "第三章", "type": "判断题", "difficulty": "难", "question": "创新就是要走前人没有走过的路。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 455, "number": 455, "chapter": "第三章", "type": "判断题", "difficulty": "易", "question": "当今时代，知识更新不断加快，社会分工日益细化，新技术新模式新业态层出不穷。这既为青年施展才华、竞展风采提供了广阔舞台，也对青年能力素质提出了新的更高要求。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 456, "number": 456, "chapter": "第三章", "type": "判断题", "difficulty": "易", "question": "缺乏深厚的专业知识积淀，盲目追求改革创新，往往容易流于不切实际的空想，或者是“无知者无畏”的蛮干。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 457, "number": 457, "chapter": "第三章", "type": "判断题", "difficulty": "易", "question": "历史上许多重要创造都是产生于创造者风华正茂、思维最敏捷的青年时期。这说明青年身上蕴藏着巨大的创造能量和活力。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 458, "number": 458, "chapter": "第三章", "type": "判断题", "difficulty": "易", "question": "纵 "}, {"label": "C", "text": "金钱政治"}, {"label": "D", "text": "贫富分化"}], "answer": "ABCD"}, {"id": 499, "number": 499, "chapter": "第四章", "type": "多选题", "difficulty": "中", "question": "社会主义核心价值观的道义力量指其（）。", "options": [{"label": "A", "text": "先进性"}, {"label": "B", "text": "人民性"}, {"label": "C", "text": "抽象性"}, {"label": "D", "text": "真实性"}], "answer": "ABD"}, {"id": 500, "number": 500, "chapter": "第四章", "type": "多选题", "difficulty": "难", "question": "由于（），大学生更加需要正确价值观的引领。", "options": [{"label": "A", "text": "世界范围内各种思想文化出现交流交融交锋"}, {"label": "B", "text": "整个社会思想价值观念多元多样、复杂多变"}, {"label": "C", "text": "大学时期是价值观养成的关键时期"}, {"label": "D", "text": "青年的未来与国家的未来同频同向"}], "answer": "ABCD"}, {"id": 501, "number": 501, "chapter": "第四章", "type": "多选题", "difficulty": "易", "question": "新时代大学生要将社会主义核心价值观转化为人生的价值准则，做到（），在激扬青春、开拓人生、奉献社会的进程中书写无愧于时代的壮丽篇章。", "options": [{"label": "A", "text": "勤学以增智"}, {"label": "B", "text": "修德以立身"}, {"label": "C", "text": "明辨以正心"}, {"label": "D", "text": "笃实以为功"}], "answer": "ABCD"}, {"id": 502, "number": 502, "chapter": "第四章", "type": "判断题", "difficulty": "易", "question": "核心价值观，承载着一个民族、一个国家的精神追求，体现着一个社会评判是非曲直的价值标准。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 503, "number": 503, "chapter": "第四章", "type": "判断题", "difficulty": "易", "question": "价值观不同的人，行为取向也会不同，甚至可能截然相反。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 504, "number": 504, "chapter": "第四章", "type": "判断题", "difficulty": "易", "question": "核心价值观是一个民族赖以维系的精神纽带，是一个国家共同的思想道德基础。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 505, "number": 505, "chapter": "第四章", "type": "判断题", "difficulty": "易", "question": "核心价值观是一个国家的重要稳定器，能否构建具有强大感召力的核心价值观，关系社会和谐稳定，关系国家长治久安。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 506, "number": 506, "chapter": "第四章", "type": "判断题", "difficulty": "难", "question": "世界上各种文化之争，本质上是价值观念之争，也是人心之争、意识形态之争。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 507, "number": 507, "chapter": "第四章", "type": "判断题", "difficulty": "易", "question": "社会主义核心价值观是中国共产党凝聚全党全社会价值共识作出的重要论断。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 508, "number": 508, "chapter": "第四章", "type": "判断题", "difficulty": "易", "question": "社会主义核心价值观的提出，鲜明确立了当代中国的核心价值理念，生动展现了中国共产党和中华民族高度的价值自觉和价值自信。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 509, "number": 509, "chapter": "第四章", "type": "判断题", "difficulty": "易", "question": "社会主义核心价值观是社会主义核心价值体系的精神内核。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 510, "number": 510, "chapter": "第四章", "type": "判断题", "difficulty": "中", "question": "社会主义核心价值观是全面建成社会主义现代化强国、实现第二个百年奋斗目标的价值引领。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 511, "number": 511, "chapter": "第四章", "type": "判断题", "difficulty": "中", "question": "人民富裕和国家强盛在根本上是统一的，这是社会主义的价值追求。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 512, "number": 512, "chapter": "第四章", "type": "判断题", "difficulty": "易", "question": "中华民族伟大复兴归根到底要落实到满足人民对美好生活的追求上，使人民的获得感、幸福感、安全感更加充实、更可持续、更有保障，朝着共同富裕方向稳步前进。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 513, "number": 513, "chapter": "第四章", "type": "判断题", "difficulty": "难", "question": "人民民主反映了人民群众的历史主体地位，是人民群众创造历史的集中体现。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 514, "number": 514, "chapter": "第四章", "type": "判断题", "difficulty": "易", "question": "文明是社会进步的重要标志，也是社会主义现代化国家的重要特征。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 515, "number": 515, "chapter": "第四章", "type": "判断题", "difficulty": "易", "question": "社会主义核心价值观倡导的文明是全面建设社会主义现代化国家的题中应有之义，是实现中华民族伟大复兴的重要支撑。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 516, "number": 516, "chapter": "第四章", "type": "判断题", "difficulty": "易", "question": "自由、平等、公正、法治的价值追求，与实现国家治理体系和治理能力现代化的要求相契合，揭示了社会主义社会发展的价值取向。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 517, "number": 517, "chapter": "第四章", "type": "判断题", "difficulty": "易", "question": "自由、平等、公正、法治，反映了人们对美好社会的期望和憧憬，是衡量现代社会是否高度发展、充满活力、和谐有序的重要标志。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 518, "number": 518, "chapter": "第四章", "type": "判断题", "difficulty": "易", "question": "公正是人类社会进步的标尺，是社会主义制度的本质要求。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 519, "number": 519, "chapter": "第四章", "type": "判断题", "difficulty": "易", "question": "社会主义核心价值观倡导的公正，不只是强调机会平等和程序正义的公正，更是兼顾结果的公正，体现在社会生活各个领域、各个层次、各个方面的公正。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 520, "number": 520, "chapter": "第四章", "type": "判断题", "difficulty": "难", "question": "在当代中国，全面推进依法治国，加快建设社会主义法治国家，是坚持和发展中国特色社会主义的本质要求和重要保障。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 521, "number": 521, "chapter": "第四章", "type": "判断题", "difficulty": "易", "question": "社会主义核心价值观倡导的法治，是立足中国的社会现实和文化传统，坚持党的领导、人民当家作主、依法治国的有机统一。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 522, "number": 522, "chapter": "第四章", "type": "判断题", "difficulty": "易", "question": "爱国是最深沉、最持久的情感，是每个公民应当遵循的最基本的价值观念和道德准则。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 523, "number": 523, "chapter": "第四章", "type": "判断题", "difficulty": "易", "question": "敬业是对待生产劳动和人类生存的一种根本价值态度。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 524, "number": 524, "chapter": "第四章", "type": "判断题", "difficulty": "易", "question": "诚信是个人立身处世的基本价值规范，是社会存续发展的重要价值基石。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 525, "number": 525, "chapter": "第四章", "type": "判断题", "difficulty": "易", "question": "社会主义核心价值观倡导的诚信，就是要以诚待人、以信取人，说老实话、办老实事、做老实人。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 526, "number": 526, "chapter": "第四章", "type": "判断题", "difficulty": "易", "question": "一个国家的文化软实力，从根本上说，取决于其核心价值观的生命力、凝聚力、感召力。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 527, "number": 527, "chapter": "第四章", "type": "判断题", "difficulty": "易", "question": "价值观在人们的观念体系中并不是孤立的，它与世界观、人生观相辅相成、相互作用、相互促进，是辩证统一的关系。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 528, "number": 528, "chapter": "第四章", "type": "判断题", "difficulty": "中", "question": "只有社会主义社会存在多种多样的价值观念和价值取向。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "错误"}, {"id": 529, "number": 529, "chapter": "第四章", "type": "判断题", "difficulty": "易", "question": "富强不仅在于富民，也在于强国，即国家强盛，体现为国家拥有强大的综合国力。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 530, "number": 530, "chapter": "第四章", "type": "判断题", "difficulty": "易", "question": "人民民主是社会主义的生命，没有民主就没有社会主义，就没有社会主义现代化。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 531, "number": 531, "chapter": "第四章", "type": "判断题", "difficulty": "难", "question": "中国共产党领导人民实行的民主是全过程人民民主。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 532, "number": 532, "chapter": "第四章", "type": "判断题", "difficulty": "易", "question": "和谐的中国，秉持世界持久和平的理想，心系人类共同繁荣的命运，担当可持续发展的历史责任。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 533, "number": 533, "chapter": "第四章", "type": "判断题", "difficulty": "易", "question": "自由是社会活力之源，是社会主义的价值理想。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 534, "number": 534, "chapter": "第四章", "type": "判断题", "difficulty": "易", "question": "社会主义核心价值观倡导的自由是与一定的经济社会发展条件相适应的自由。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 535, "number": 535, "chapter": "第四章", "type": "判断题", "difficulty": "易", "question": "社会主义核心价值观倡导的自由不只是追求物质生活的改善，更重要的是保证人民充分享有发展自我、实现自我的机会，使每个人都能人生出彩、梦想成真。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 536, "number": 536, "chapter": "第四章", "type": "判断题", "difficulty": "易", "question": "法治是人类政治文明的重要成果，是现代社会的主要特征。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 537, "number": 537, "chapter": "第四章", "type": "判断题", "difficulty": "易", "question": "全面推进依法治国是实现国家治理体系和治理能力现代化的必然要求，事关我们党执政兴国、事关人民幸福安康、事关党和国家长治久安。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 538, "number": 538, "chapter": "第四章", "type": "判断题", "difficulty": "易", "question": "社会主义核心价值观倡导的爱国，就是让个人梦想与国家梦想紧密结合，把我们的国家建设好，把我们的民族发展好。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 539, "number": 539, "chapter": "第四章", "type": "判断题", "difficulty": "易", "question": "社会主义核心价值观倡导的敬业要求人们有全身心投入的敬业态度和精益求精的工匠精神。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 540, "number": 540, "chapter": "第四章", "type": "判断题", "difficulty": "易", "question": "现代社会不仅是物质丰裕的社会，也应是诚信有序的社会；市场经济不仅是法治经济，更应是信用经济。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 541, "number": 541, "chapter": "第四章", "type": "判断题", "difficulty": "易", "question": "友善是公民优秀的个人品质，是构建和谐人际关系和社会关系的道德纽带，更是维护健康良好社会秩序的伦理基础。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 542, "number": 542, "chapter": "第四章", "type": "判断题", "difficulty": "易", "question": "中国特色社会主义既需要为人们描绘未来社会物质生活方面的目标，也需要为人们指出未来社会精神价值的归宿。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 543, "number": 543, "chapter": "第四章", "type": "判断题", "difficulty": "易", "question": "只有建立共同的价值目标，一个国家和民族才会有赖以维系的精神纽带，才会有统一的意志和行动，才会有强大的凝聚力、向心力。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 544, "number": 544, "chapter": "第四章", "type": "判断题", "difficulty": "易", "question": "中国式现代化是物质文明和精神文明相协调的现代化。物质贫困不是社会主义，精神贫乏也不是社会主义。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 545, "number": 545, "chapter": "第四章", "type": "判断题", "difficulty": "易", "question": "当今世界，文化越来越成为综合国力竞争的重要因素，成为经济社会发展的重要支撑，文化软实力越来越成为争夺发展制高点、道义制高点的关键所在。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 546, "number": 546, "chapter": "第四章", "type": "判断题", "difficulty": "易", "question": "社会主义作为人类社会迄今为止最先进的社会制度，其价值观同社会主义经济基础和上层建筑相适应，充分彰显了社会主义社会的本质要求。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 547, "number": 547, "chapter": "第四章", "type": "判断题", "difficulty": "易", "question": "任何一种价值观都不可能凭空产生，总是有其特定的历史底色和精神脉络。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 548, "number": 548, "chapter": "第四章", "type": "判断题", "difficulty": "易", "question": "中华优秀传统文化是涵养社会主义核心价值观的重要源泉。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 549, "number": 549, "chapter": "第四章", "type": "判断题", "difficulty": "易", "question": "人类是在对理想社会的追求中不断进步的，不同时代的人们提出了具有时代特点的价值理想。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 550, "number": 550, "chapter": "第四章", "type": "判断题", "difficulty": "易", "question": "“普世价值”就是一种极具迷惑性、欺骗性并且带有鲜明政治倾向的价值观。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 551, "number": 551, "chapter": "第四章", "type": "判断题", "difficulty": "易", "question": "资本主义价值观是在资本主义生产方式基础上形成的，从根本上说，是为资产阶级利益服务的。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 552, "number": 552, "chapter": "第四章", "type": "判断题", "difficulty": "易", "question": "资产阶级把自己的价值观以全人类的共同价值观装饰起来，其目的就是为了维护和攫取与之相关的最大利益。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 553, "number": 553, "chapter": "第四章", "type": "判断题", "difficulty": "易", "question": "中国走上社会主义道路，是近代以来中国社会发展的历史必然，是历史的选择、人民的选择，凝聚着中国共产党带领全国各族人民持续奋斗的实践经验。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 554, "number": 554, "chapter": "第四章", "type": "判断题", "difficulty": "易", "question": "社会主义核心价值观在吸收人类优秀的价值理念的基础上，以中国经验、中国实践为民主、自由、平等、公正、法治等价值理念赋予社会主义性质，代表了人类社会前进的方向和价值理念。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 555, "number": 555, "chapter": "第四章", "type": "判断题", "difficulty": "易", "question": "社会主义核心价值观以海纳百川的气度广泛吸收借鉴了包括资本主义文明成果在内的人类一切文明成果，萃取精华、融会贯通，形成了具有世界视野、中国气派的价值观。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 556, "number": 556, "chapter": "第四章", "type": "判断题", "difficulty": "易", "question": "当代大学生要意识到自身肩负的历史使命，自觉加强价值观养成，树立正确的价值取向。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 557, "number": 557, "chapter": "第四章", "type": "判断题", "difficulty": "易", "question": "培育和践行社会主义核心价值观，要增强自己的价值判断力和道德责任感，辨别什么是真善美、什么是假恶丑，自觉做到常修善德、常怀善念、常做善举。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 558, "number": 558, "chapter": "第四章", "type": "判断题", "difficulty": "易", "question": "培育和践行社会主义核心价值观，既要目标高远，保持定力、不懈奋进，又要脚踏实地，严于律己、精益求精。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 559, "number": 559, "chapter": "第四章", "type": "判断题", "difficulty": "易", "question": "在全社会培育和弘扬社会主义核心价值观，需要大学生始终走在时代前列，成为培育和践行社会主义核心价值观最积极、最活跃的青年先进代表。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 560, "number": 560, "chapter": "第四章", "type": "判断题", "difficulty": "易", "question": "正确的价值观能够引导大学生把人生价值追求融入国家和民族事业，始终站在人民大众立场。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 561, "number": 561, "chapter": "第五章", "type": "单选题", "difficulty": "易", "question": "（）道德观是科学世界观、人生观、价值观在道德领域的反映与体现。", "options": [{"label": "A", "text": "封建主义"}, {"label": "B", "text": "资本主义"}, {"label": "C", "text": "个人主义"}, {"label": "D", "text": "马克思主义"}], "answer": "D"}, {"id": 562, "number": 562, "chapter": "第五章", "type": "单选题", "difficulty": "易", "question": "道德起源的首要前提是（）。", "options": [{"label": "A", "text": "社会关系"}, {"label": "B", "text": "社会经济"}, {"label": "C", "text": "人类自我意识"}, {"label": "D", "text": "劳动"}], "answer": "D"}, {"id": 563, "number": 563, "chapter": "第五章", "type": "单选题", "difficulty": "易", "question": "（）创造了人、社会和社会关系，也创造了道德。", "options": [{"label": "A", "text": "自然"}, {"label": "B", "text": "劳动"}, {"label": "C", "text": "动物进化"}, {"label": "D", "text": "语言"}], "answer": "B"}, {"id": 564, "number": 564, "chapter": "第五章", "type": "单选题", "difficulty": "易", "question": "马克思主义在人类思想史上第一次科学而全面地论述了道德的起源问题，强调道德属于（）。", "options": [{"label": "A", "text": "经济范畴"}, {"label": "B", "text": "法律范畴"}, {"label": "C", "text": "上层建筑的范畴"}, {"label": "D", "text": "艺术范畴"}], "answer": "C"}, {"id": 565, "number": 565, "chapter": "第五章", "type": "单选题", "difficulty": "易", "question": "（）在人类思想史上第一次科学而全面地论述了道德的起源问题，强调道德是一种特殊的社会意识形态。", "options": [{"label": "A", "text": "马克思主义"}, {"label": "B", "text": "黑格尔主义"}, {"label": "C", "text": "实用主义"}, {"label": "D", "text": "社会达尔文主义"}], "a ", "text": "普遍性"}, {"label": "D", "text": "时代性"}], "answer": "B"}, {"id": 580, "number": 580, "chapter": "第五章", "type": "单选题", "difficulty": "易", "question": "道德与法律规范、政治规范的不同之处不包括（）。", "options": [{"label": "A", "text": "用善恶标准去评价"}, {"label": "B", "text": "依靠社会舆论、传统习俗、内心信念来维持"}, {"label": "C", "text": "是一种非强制性的规范"}, {"label": "D", "text": "有明确的条文规定"}], "answer": "D"}, {"id": 581, "number": 581, "chapter": "第五章", "type": "单选题", "difficulty": "易", "question": "道德把握世界的方式是从人的需要出发，从特定的价值出发来（）。", "options": [{"label": "A", "text": "描述世界"}, {"label": "B", "text": "改造世界"}, {"label": "C", "text": "再现世界"}, {"label": "D", "text": "反映世界"}], "answer": "B"}, {"id": 582, "number": 582, "chapter": "第五章", "type": "单选题", "difficulty": "易", "question": "（）是人类道德合乎规律发展的必然产物，是人类道德发展史上的一种崭新类型的道德。", "options": [{"label": "A", "text": "功利主义道德"}, {"label": "B", "text": "资本主义道德"}, {"label": "C", "text": "封建主义道德"}, {"label": "D", "text": "社会主义和共产主义道德"}], "answer": "D"}, {"id": 583, "number": 583, "chapter": "第五章", "type": "单选题", "difficulty": "中", "question": "（）是道德的核心问题，决定并体现着道德建设的根本性质和发展方向，规定并制约着道德领域中的所有道德现象。", "options": [{"label": "A", "text": "如何提升自身修养"}, {"label": "B", "text": "为什么人服务"}, {"label": "C", "text": "怎样引导人们正确实践"}, {"label": "D", "text": "对错误行为如何处罚"}], "answer": "B"}, {"id": 584, "number": 584, "chapter": "第五章", "type": "单选题", "difficulty": "易", "question": "在正确善恶观的指引下，规范社会成员在社会公共领域、职业领域、家庭领域的行为，并规范个人品德的养成，引导并促进人们崇德向善。这是道德的（）。", "options": [{"label": "A", "text": "认识功能"}, {"label": "B", "text": "调节功能"}, {"label": "C", "text": "规范功能"}, {"label": "D", "text": "处罚功能"}], "answer": "C"}, {"id": 585, "number": 585, "chapter": "第五章", "type": "单选题", "difficulty": "易", "question": "中华传统美德把（）的实现看作人生诸种需要中最高层次的需要。", "options": [{"label": "A", "text": "世俗功名"}, {"label": "B", "text": "荣华富贵"}, {"label": "C", "text": "道德理想"}, {"label": "D", "text": "子孙满堂"}], "answer": "C"}, {"id": 586, "number": 586, "chapter": "第五章", "type": "单选题", "difficulty": "难", "question": "墨家非常重视“修身”，强调“察色修身”和“以身戴行”，这反 : "第五章", "type": "多选题", "difficulty": "易", "question": "（）是集体主义的最高层次，是优秀共产党员、先进分子应努力达到的道德目标。", "options": [{"label": "A", "text": "明哲保身"}, {"label": "B", "text": "无私奉献"}, {"label": "C", "text": "一心为公"}, {"label": "D", "text": "先私后公"}], "answer": "BC"}, {"id": 608, "number": 608, "chapter": "第五章", "type": "多选题", "difficulty": "易", "question": "集体主义对公民的道德要求是（），以正当合法的手段保障个人利益。", "options": [{"label": "A", "text": "顾全大局"}, {"label": "B", "text": "遵纪守法"}, {"label": "C", "text": "热爱祖国"}, {"label": "D", "text": "诚实劳动"}], "answer": "ABCD"}, {"id": 609, "number": 609, "chapter": "第五章", "type": "多选题", "difficulty": "中", "question": "当代大学生应正确认识和处理国家利益、社会整体利益和个人利益的关系，自觉坚持（）。", "options": [{"label": "A", "text": "个人利益服从集体利益"}, {"label": "B", "text": "局部利益服从整体利益"}, {"label": "C", "text": "当前利益服从长远利益"}, {"label": "D", "text": "反对小团体主义、本位主义和极端个人主义"}], "answer": "ABCD"}, {"id": 610, "number": 610, "chapter": "第五章", "type": "多选题", "difficulty": "中", "question": "人的自我意识是道德产生的主观条件，只有在社会实践中（），道德才得以产生。", "options": [{"label": "A", "text": "意识到自我作为社会成员与其他动物的根本区别"}, {"label": "B", "text": "意识到自我在社会中的角色与地位"}, {"label": "C", "text": "意识到自我与他人或集体不同的利益关系"}, {"label": "D", "text": "产生调节利益矛盾的迫切要求"}], "answer": "ABCD"}, {"id": 611, "number": 611, "chapter": "第五章", "type": "多选题", "difficulty": "易", "question": "道德往往运用（）等范畴，反映人类的道德实践活动和道德关系，从中揭示社会道德发展的趋势，为人们的行为选择提供指南。", "options": [{"label": "A", "text": "善恶"}, {"label": "B", "text": "荣辱"}, {"label": "C", "text": "义务"}, {"label": "D", "text": "良心"}], "answer": "ABCD"}, {"id": 612, "number": 612, "chapter": "第五章", "type": "多选题", "difficulty": "易", "question": "道德作为激励人们改造客观世界和主观世界的一种精神力量，也是（）的内在动力。", "options": [{"label": "A", "text": "提高人的精神境界"}, {"label": "B", "text": "促进人的自我完善"}, {"label": "C", "text": "推动人的全面发展"}, {"label": "D", "text": "解决一切困难"}], "answer": "ABC"}, {"id": 613, "number": 613, "chapter": "第五章", "type": "多选题", "difficulty": "易", "question": "社会主义道德克服了以往阶级社会道德的（），坚持以为人民服务为核心，坚持以集体主义为原则，展现出真实而强大的道义力量。", "options": [{"label": "A", "te "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 661, "number": 661, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "道德的作用是指道德的认识、规范、调节、激励、导向、教育等功能的发挥和实现所产生的社会影响及实际效果。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 662, "number": 662, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "道德作为维系社会稳定、促进国家发展的重要因素，对巩固特定社会的经济基础和上层建筑具有不可替代的重要作用。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 663, "number": 663, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "只有反映先进生产力发展要求和进步阶级利益的道德，才会对社会的发展和人的素质的提高产生积极的推动作用。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 664, "number": 664, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "道德的力量既深刻地影响着人们的意志、行为和品格，也深刻地影响着社会的存在和发展", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 665, "number": 665, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "道德的发展在一定时期可能有某种停滞或倒退现象，但它的总趋势是向上的、前进的，是沿着曲折的道路向前发展的。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 666, "number": 666, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "人类道德发展的历史过程与社会生产方式的发展进程大体一致，这是道德发展的基本规律。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 667, "number": 667, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "“道德万能论”片面夸大道德的作用，颠倒了社会存在和社会意识、经济基础同上层建筑之间的决定与被决定的关系。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 668, "number": 668, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "大学生践行为人民服务，就是要弘扬为人民服务的精神，尊重人、理解人、关心人，为人民、为社会、为国家多做好事、多作贡献。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 669, "number": 669, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "道德原则是道德规范体系的总纲，它最直接最集中地反映着一定社会经济关系和利益关系的根本要求,代表着一定阶级的根本利益和长远利益。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 670, "number": 670, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "在社会主义社会中，国家利益、社会整体利益和个人利益是不能分割的。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 671, "number": 671, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "在个人利益与国家利益、社会整体利益发生矛盾尤其是发生激烈冲突的时候，个人利益要服从于国家利益和社会整体利益，必要时作出牺牲。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 672, "number": 672, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "集体主义重视和保障个人的正当利益，只有个人的价值、尊严得到实现，个人的正当利益得到保证，集体才能有更强大的生命力和凝聚力。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 673, "number": 673, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "集体主义重视和保障的是个人的正当利益，对于损人利己、损公肥私的行为，集体主义不但不保护，而且强烈反对和禁止。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 674, "number": 674, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "在社会主义市场经济条件下，集体主义仍然而且应当成为社会主义道德的基本原则。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 675, "number": 675, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "自觉把集体利益放在个人利益至上，在维护集体利益的前提下，实现个人的正当利益。这是已经具有较高社会主义道德觉悟的人能够达到的要求。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 676, "number": 676, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "物质生活的生产方式制约着整个社会生活、政治生活和精神生活的过程。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 677, "number": 677, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "道德的功能，一般是指道德作为社会意识的特殊形式对于社会发展所具有的功效与作用。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 678, "number": 678, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "法律和道德都是重要的社会规范，国家和社会治理需要法律和道德共同发挥作用。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 679, "number": 679, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "在社会主义社会，各行各业的劳动者和建设者，只是社会分工不同，没有高低贵贱之分。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 680, "number": 680, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "道德随着社会经济关系的变化而变化。新旧经济关系更替之后，新的道德必将取代旧的道德而居于主导地位。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 681, "number": 681, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "作为实践精神，道德是一种旨在通过把握世界的善恶现象而规范人们的行为，并通过人们的实践活动体现出来的社会意识。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 682, "number": 682, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "一个法治健全的社会应该是一个道德规范健全的社会，离开道德仅仅依靠法律，则无法达到社会秩序井然的状态和长治久安的目标。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 683, "number": 683, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "道德发挥作用的性质与社会发展的不同历史阶段相联系，由道德所反映的经济基础、代表的阶级利益所决定。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 684, "number": 684, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "社会主义道德是对人类优秀道德资源的批判继承和创新发展。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 685, "number": 685, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "集体主义要求个人为国家、社会作出牺牲并不是随意的，只有在不牺牲个人利益就不能保全国家利益、社会整体利益的情况下，才要求个人作出牺牲。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 686, "number": 686, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "集体主义是对个人的压制、对个性的束缚。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "错误"}, {"id": 687, "number": 687, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "传统道德是历史上不同时代人们的行为方式、风俗习惯、价值观念和文化心理的集中体现，是对道德实践经验的提炼总结。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 688, "number": 688, "chapter": "第五章", "type": "判断题", "difficulty": "难", "question": "在中华传统道德的发展演化中，我们始终强调整体利益、国家利益和民族利益的重要性。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 689, "number": 689, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "中华传统美德非常重视每个人在人伦关系中的地位及其价值，强调每个人都必须根据规范的要求来尽自己应尽的义务。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 690, "number": 690, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "任何道德都是具体历史时代的产物。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 691, "number": 691, "chapter": "第五章", "type": "判断题", "difficulty": "中", "question": "中国传统道德从整体上来说在今天已经失去了价值和意义，必须从整体上予以全盘否定。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "错误"}, {"id": 692, "number": 692, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "传承和发扬中国革命道德，是弘扬中华传统美德的应有之义，是加强社会主义道德建设的客观需要，也是激励大学生锤炼优良道德品质的必然要求。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 693, "number": 693, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "中国革命道德是马克思主义与中国革命、建设、改革的伟大实践相结合的产物，是中华民族极其宝贵的道德财富。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 694, "number": 694, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "中国革命道德作为一种精神力量对中国的革命、建设、改革事业发挥着极其重要的作用。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 695, "number": 695, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "中国革命道德继承了中国传统道德的精华，摒弃了传统道德的糟粕，是中国优良传统道德的延续和发展，是超越了中华传统美德的时代局限而形成的一种崭新的道德。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 696, "number": 696, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "坚持社会主义和共产主义理想信念是革命道德的灵魂。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 697, "number": 697, "chapter": "第五章", "type": "判断题", "difficulty": "难", "question": "中国共产党人把加强个人道德修养看成是能够影响革命成败的大事。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 698, "number": 698, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "弘扬中国革命道德，有利于树立和培养人民群众的社会主义和共产主义的理想信念，有利于坚持和发展中国特色社会主义道路。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 699, "number": 699, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "一个人如果没有精神、没有理想信念的支持，就会被各种错误思想和观点牵着鼻子引上邪路，甚至会对国家和社会造成危害。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 700, "number": 700, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "弘扬中国革命道德，既要正视人民群众的物质利益,不断提高和改善人民的物质生活，又要进行理想信念的教育，充实人民群众的精神生活。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 701, "number": 701, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "弘扬中国革命道德，有利于培育和践行社会主义核心价值观。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 702, "number": 702, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "中国革命道德是先进价值观在道德领域的集中体现，蕴含着培育和践行社会主义核心价值观的丰富思想道德资源。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 703, "number": 703, "chapter": "第五章", "type": "判断题", "difficulty": "中", "question": "一个国家或民族的道德进步，只要在文明交流中坚守自身优秀道德传统就可以了。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "错误"}, {"id": 704, "number": 704, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "道德是某个民族或国家在特定历史条件下，为回应来自自然环境、社会生活和人际关系的各种矛盾而形成发展起来的。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 705, "number": 705, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "道德反映了具体民族或国家的生存方式和生活态度。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 706, "number": 706, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "每一个民族或国家都有自己优良的道德传统，都对促进道德的发展作出过不同程度的贡献。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 707, "number": 707, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "借鉴和吸收人类文明优秀道德成果，必须秉承正确的态度和科学的方法。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 708, "number": 708, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "中华优秀传统文化中很多思想理念和道德规范，至今仍具有重要价值。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 709, "number": 709, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "历史经验表明，革命传统特别是革命道德传统，是克服前进道路上一切困难的重要精神支柱，是战胜千难万险的重要力量源泉。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 710, "number": 710, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "大学生应当自觉继承并弘扬中华传统美德和中国革命道德，同时以开放的胸怀和视野吸收借鉴人类文明的优秀道德成果。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 711, "number": 711, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "中华传统美德是人类文明发展的重要精神财富，是社会主义道德建设的源头活水。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 712, "number": 712, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "革命前辈们在艰苦卓绝的革命斗争中培育起来的革命道德和优良传统，是我们在前进道路上战胜各种困难和风险、不断夺取新胜利的强大精神力量。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 713, "number": 713, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "全心全意为人民服务作为贯穿中国革命道德始终的一根红线，是中国共产党在中国革命实践中的一个伟大创造，对中国的革命、建设、改革事业产生了极其重大的推动作用。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 714, "number": 714, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "中国革命道德要求一切革命者和先进分子自觉地服从革命利益。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 715, "number": 715, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "中国革命道德要求革命的集体和领导始终不渝地从各个方面照顾每个革命成员的个人利益。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 716, "number": 716, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "大学生要自觉讲道德、尊道德、守道德，做社会主义道德的践行者、示范者和引领者。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 717, "number": 717, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "在社会公德要求中，遵纪守法是全体公民都必须遵循的基本行为准则，是维护公共生活秩序的重要条件。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 718, "number": 718, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "每个社会成员既要遵守国家颁布的有关法律、法规，也要遵守特定公共场所和单位的有关纪律规定。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 719, "number": 719, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "网络生活中的道德要求，是人们在网络生活中为了维护正常的网络公共秩序而需要共同遵守的基本道德准则。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 720, "number": 720, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "网络行为主体的文明自律是网络空间道德建设的基础。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 721, "number": 721, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "大学生要文明上网，尊德守法、文明互动、理性表达，远离不良网站，防止沉迷网络，自觉维护良好网络秩序。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 722, "number": 722, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "大学生要树立自我保护意识，开展健康有益的交往活动，重视个人信息安全，避免给自己的人身和财产安全带来危害。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 723, "number": 723, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "大学生应当在网络生活中培养自律精神，在缺少外在监督的网络空间里，做到自律而“不逾矩”，促进网络生活的健康与和谐。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 724, "number": 724, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "良好的网络环境需要网民的共同努力，纷繁复杂的网络言论如果得不到正确引导，势必会引发各种社会问题。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 725, "number": 725, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "不论时代发生多大变化，生活格局发生多大变化，都要重视家庭建设，注重家庭、家教、家风。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 726, "number": 726, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "家庭的前途命运同国家和民族的前途命运紧密相连。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 727, "number": 727, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "只有实现中华民族伟大复兴的中国梦，家庭梦才能梦想成真。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 728, "number": 728, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "良好的家风，对家庭成员的个人修养产生着重要的作用，也对整个社会道德风尚的形成产生着重要的影响。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 729, "number": 729, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "男女双方培养爱情的过程或在爱情基础上进行的相互交往活动，就是人们日常所说的恋爱。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 730, "number": 730, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "恋爱的双方在人格上都是独立的，如果把对方当作自己的附庸或依附对方而失去自我，都是对爱情实质的曲解。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 731, "number": 731, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "恋爱双方在相互关系上是平等的，都有给予爱、接受爱和拒绝爱的自由。放纵自己的情感，束缚或强迫对方，都不符合恋爱的道德要求。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 732, "number": 732, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "自愿地为对方承担责任是爱情本质的体现。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 733, "number": 733, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "勤俭是家庭兴旺的保证，也是社会富足的保证。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 734, "number": 734, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "个人品德在社会道德建设中具有基础性作用。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 735, "number": 735, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "个人品德是个体对某种道德要求认同和践履的结果。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 736, "number": 736, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "在道德认知向道德行为转化的过程中，道德意志和道德信念是关键环节。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 737, "number": 737, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "道德意志和道德信念是人们在践履道德原则、规范的过程中表现出的自觉克服一切困难和障碍的毅力。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 738, "number": 738, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "高尚道德品格的形成重在实践，贵在坚持。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 739, "number": 739, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "道德修养作为人类道德实践活动的重要形式之一，是指个体自觉地将一定社会的道德规范、准则及要求内化为内在的道德品质，以促进人格的自我陶冶、自我培育和自我完善的实践过程。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 740, "number": 740, "chapter": "第五章", "type": "判断题", "difficulty": "中", "question": "道德模范固然可敬可爱，但不可学，因为他们太高大。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "错误"}, {"id": 741, "number": 741, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "道德模范都是从自我做起，从身边事做起，从小事做起，以此实现了由现实自我向理想自我的飞跃。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 742, "number": 742, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "志愿服务是指志愿贡献个人的时间及精力，在不求任何物质报酬的情况下，为改善社会、促进社会进步而提供的服务。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 743, "number": 743, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "良好的社会风尚是人们在社会道德实践中逐渐形成的。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 744, "number": 744, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "新时代的大学生作为实现民族伟大复兴重任的中坚力量，其道德状态和精神风貌在很大程度上影响着整个社会的道德状态和精神风貌。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 745, "number": 745, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "志愿服务是培育和弘扬社会主义核心价值观的重要载体。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 746, "number": 746, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "社会文明状况是社会风尚的重要体现。各种创建文明城市、文明村镇、文明单位、文明家庭、文明校园的活动，就是要在全社会推动形成知荣辱、讲正气、作奉献、促和谐的社会风尚。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 747, "number": 747, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "从本质上说，网络交往仍然是人与人的现实交往，网络生活也是人的真实生活。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 748, "number": 748, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "正确的劳动观念是维系人们职业活动和职业生活的思想观念保障。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 749, "number": 749, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "职业活动不仅是人们谋生的手段，也是人们奉献社会、完善自身的必要条件。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 750, "number": 750, "chapter": "第五章", "type": "判断题", "difficulty": "易", "question": "恋人出入公共场所，要遵守社会公德，不要对他人生活和公共生活造成不良影响。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 751, "number": 751, "chapter": "第六章", "type": "单选题", "difficulty": "易", "question": "法律由国家制定和认可，由（）保证实施。", "options": [{"label": "A", "text": "公民自觉"}, {"label": "B", "text": "国家强制力"}, {"label": "C", "text": "宗族会议"}, {"label": "D", "text": "行业约束"}], "answer": "B"}, {"id": 752, "number": 752, "chapter": "第六章", "type": "单选题", "difficulty": "易", "question": "法律是（）意志的体现。", "options": [{"label": "A", "text": "生产者"}, {"label": "B", "text": "消费者"}, {"label": "C", "text": "统治阶级"}, {"label": "D", "text": "被统治阶级"}], "answer": "C"}, {"id": 753, "number": 753, "chapter": "第六章", "type": "单选题", "difficulty": "易", "question": "法律作为上层建筑的重要组成部分，它的基本内容和性质总是与所在社会的（）相适应的。", "options": [{"label": "A", "text": "人口数量"}, {"label": "B", "text": "生产关系"}, {"label": "C", "text": "自然地理环境"}, {"label": "D", "text": "人口结构"}], "answer": "B"}, {"id": 754, "number": 754, "chapter": "第六章", "type": "单选题", "difficulty": "易", "question": "（）是人类历史上以公有制为基础的新型法律。", "options": [{"label": "A", "text": "奴隶制法律"}, {"label": "B", "text": "封建制法律"}, {"label": "C", "text": "资本主义法律"}, {"label": "D", "text": "社会主义法律"}], "answer": "D"}, {"id": 755, "number": 755, "chapter": "第六章", "type": "单选题", "difficulty": "易", "question": "社会主义法律是（）意志的集中体现，是实现人民当家作主、实行人民民主专政的重要保证。", "options": [{"label": "A", "text": "奴隶主阶级"}, {"label": "B", "text": "封建地主阶级"}, {"label": "C", "text": "资产阶级"}, {"lab : "易", "question": "中国特色社会主义最本质的特征是党的领导。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 896, "number": 896, "chapter": "第六章", "type": "判断题", "difficulty": "易", "question": "党的领导和依法治国不是对立的，而是统一的。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 897, "number": 897, "chapter": "第六章", "type": "判断题", "difficulty": "易", "question": "党的本质是政治组织，而法的本质是行为规则，两者不存在谁比谁大的问题。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 898, "number": 898, "chapter": "第六章", "type": "判断题", "difficulty": "中", "question": "“党大还是法大”是个伪命题，所以具体到每个党政组织、每个领导干部，就不必服从和遵守宪法法律。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "错误"}, {"id": 899, "number": 899, "chapter": "第六章", "type": "判断题", "difficulty": "易", "question": "我国宪法规定了，国家保护妇女的权利和利益，实行男女同工同酬，培养和选拔妇女干部。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 900, "number": 900, "chapter": "第六章", "type": "判断题", "difficulty": "易", "question": "任何组织和个人不得将英雄烈士的姓名、肖像用于或者变相用于商标、商业广告，损害英雄烈士的名誉、荣誉。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 901, "number": 901, "chapter": "第六章", "type": "判断题", "difficulty": "易", "question": "完备的法律规范体系是中国特色社会主义法治体系的前提，是法治国家、法治政府、法治社会的制度基础。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 902, "number": 902, "chapter": "第六章", "type": "判断题", "difficulty": "易", "question": "建设高效的法治实施体系是建设中国特色社会主义法治体系的重点。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 903, "number": 903, "chapter": "第六章", "type": "判断题", "difficulty": "易", "question": "有力的法治保障体系是全面依法治国的重要依托。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 904, "number": 904, "chapter": "第六章", "type": "判断题", "difficulty": "易", "question": "建设完善的党内法规体系是中国特色社会主义法治体系的本质要求和重要内容。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 905, "number": 905, "chapter": "第六章", "type": "判断题", "difficulty": "易", "question": "不是什么法都能治国，不是什么法都能治好国；越是强调法治，越是要提高立法质量。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 906, "number": 906, "chapter": "第六章", "type": "判断题", "difficulty": "易", "question": "加强对司法活动的监督，就包括要规范媒体对案件的报道，防止舆论影响司法公正。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 907, "number": 907, "chapter": "第六章", "type": "判断题", "difficulty": "易", "question": "全面依法治国是国家治理的一场深刻革命，关系党执政兴国，关系人民幸福安康，关系党和国家长治久安。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 908, "number": 908, "chapter": "第六章", "type": "判断题", "difficulty": "易", "question": "习近平法治思想深刻揭示了社会主义法治的生命力和优越性，推动了中国特色社会主义法治理论创新发展。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 909, "number": 909, "chapter": "第六章", "type": "判断题", "difficulty": "易", "question": "习近平法治思想，坚持马克思主义的立场、观点、方法，为马克思主义法治理论发展作出了独创性、原创性、集成性贡献。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 910, "number": 910, "chapter": "第六章", "type": "判断题", "difficulty": "易", "question": "民法典是中华人民共和国成立以来第一部以“法典”命名的法律，是新时代我国社会主义法治建设的重大成果。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 911, "number": 911, "chapter": "第六章", "type": "判断题", "difficulty": "易", "question": "党的领导是中国特色社会主义法治之魂，是我们的法治同西方资本主义国家的法治最大的区别。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 912, "number": 912, "chapter": "第六章", "type": "判断题", "difficulty": "易", "question": "法治意味着不管什么人，不管涉及谁，只要违反法律就要依法追究责任。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 913, "number": 913, "chapter": "第六章", "type": "判断题", "difficulty": "易", "question": "公正司法是维护社会公平正义的最后一道防线。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 914, "number": 914, "chapter": "第六章", "type": "判断题", "difficulty": "易", "question": "因违法违纪被开除公职的司法人员、吊销执业证书的律师和公证员，可以继续从事法律职业。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "错误"}, {"id": 915, "number": 915, "chapter": "第六章", "type": "判断题", "difficulty": "易", "question": "法治权威能不能树立起来，首先要看宪法有没有权威。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 916, "number": 916, "chapter": "第六章", "type": "判断题", "difficulty": "易", "question": "我国宪法确认了党领导人民长期奋斗取得的辉煌成果，规定了人民民主专政国家政权的性质和根本制度。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 917, "number": 917, "chapter": "第六章", "type": "判断题", "difficulty": "中", "question": "宪法序言与宪法总纲、宪法具体条文有很大的区别，所以宪法序言没有法律效力。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "错误"}, {"id": 918, "number": 918, "chapter": "第六章", "type": "判断题", "difficulty": "易", "question": "我国现行宪法是我们国家和人民经受住各种困难和风险考验、始终沿着中国特色社会主义道路前进的根本法制保障。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 919, "number": 919, "chapter": "第六章", "type": "判断题", "difficulty": "中", "question": "地方性法规的制定必须以宪法为依据，其他的法律法规则不用。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "错误"}, {"id": 920, "number": 920, "chapter": "第六章", "type": "判断题", "difficulty": "难", "question": "我们讲依宪治国、依宪执政，不是要否定和放弃党的领导，而是强调党领导人民制定宪法和法律，党领导人民执行宪法和法律，党自身必须在宪法和法律的范围内活动。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 921, "number": 921, "chapter": "第六章", "type": "判断题", "difficulty": "中", "question": "由于国家机关和国家工作人员侵犯公民权利而受到损失的人，没有索取赔偿的权利。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "错误"}, {"id": 922, "number": 922, "chapter": "第六章", "type": "判断题", "difficulty": "难", "question": "世界上没有放之四海而皆准的人权发展道路和保障模式，人权事业发展必须按照国际社会的主流意见加以推进。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "错误"}, {"id": 923, "number": 923, "chapter": "第六章", "type": "判断题", "difficulty": "中", "question": "国家立法权、行政权、监察权、审判权和检察权极为特殊，它们可以不受宪法和法律的约束。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "错误"}, {"id": 924, "number": 924, "chapter": "第六章", "type": "判断题", "difficulty": "易", "question": "宪法的生命在于实施，宪法的权威也在于实施。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 925, "number": 925, "chapter": "第六章", "type": "判断题", "difficulty": "易", "question": "宪法是实现国家认同、凝聚社会共识、促进个人发展的基本准则，是维系一个国家、一个民族凝聚力的根本纽带。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 926, "number": 926, "chapter": "第六章", "type": "判断题", "difficulty": "易", "question": "任何组织或者个人都不得有超越宪法法律的特权。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 927, "number": 927, "chapter": "第六章", "type": "判断题", "difficulty": "易", "question": "尊法学法守法用法，增强法治意识，提高法治素养，必须养成良好的法治思维和行为方式。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 928, "number": 928, "chapter": "第六章", "type": "判断题", "difficulty": "易", "question": "法治思维以法律原则和法律规则为依据指导人们的社会行为，是一种规范思维。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 929, "number": 929, "chapter": "第六章", "type": "判断题", "difficulty": "易", "question": "法治思维以法律手段与法律方法为依托分析问题、处理问题、解决纠纷，是一种逻辑思维。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 930, "number": 930, "chapter": "第六章", "type": "判断题", "difficulty": "易", "question": "法治思维是一种符合规律、尊重事实的科学思维。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 931, "number": 931, "chapter": "第六章", "type": "判断题", "difficulty": "易", "question": "法治思维是一种融法律的价值属性和工具理性于一体的特殊的高级法律意识。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 932, "number": 932, "chapter": "第六章", "type": "判断题", "difficulty": "易", "question": "法治思维是基于对法律的尊崇和对法治的信念判断是非、权衡利弊、解决问题的思维方式。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 933, "number": 933, "chapter": "第六章", "type": "判断题", "difficulty": "易", "question": "权力制约是指国家机关的权力必须受到法律的规制和约束。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 934, "number": 934, "chapter": "第六章", "type": "判断题", "difficulty": "易", "question": "在我国，国家权力是人民的，即一切权力为民所有；国家权力是为人民服务的，即一切权力为民所用。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 935, "number": 935, "chapter": "第六章", "type": "判断题", "difficulty": "易", "question": "只有依法对权力的配置和运行进行有效制约和监督，才能防止权力私用、权力滥用和权力腐败。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 936, "number": 936, "chapter": "第六章", "type": "判断题", "difficulty": "易", "question": "权力由法定，即法无授权不可为，是指国家机关的职权必须来自法律明确的授予。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 937, "number": 937, "chapter": "第六章", "type": "判断题", "difficulty": "易", "question": "国家机关必须严格依照法律规定的权限行使职权，不得行使法律未授予的权力。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 938, "number": 938, "chapter": "第六章", "type": "判断题", "difficulty": "易", "question": "有权必有责，是指国家机关在获得权力的同时必须承担相应的职责和责任。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 939, "number": 939, "chapter": "第六章", "type": "判断题", "difficulty": "易", "question": "当发生了属于其职权范围内的事项时，国家机关必须履行相应的管理职责。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 940, "number": 940, "chapter": "第六章", "type": "判断题", "difficulty": "易", "question": "用权受监督，是指国家权力的运行和行使必须接受各种形式的监督，让人民监督权力，让权力在阳光下运行。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 941, "number": 941, "chapter": "第六章", "type": "判断题", "difficulty": "易", "question": "违法受追究，是指国家工作人员违法行使权力必须受到法律的追究和制裁。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 942, "number": 942, "chapter": "第六章", "type": "判断题", "difficulty": "易", "question": "养成权力制约思维，要求自觉运用权力、勇于监督权力，同时自觉监督宪法、法律的实施。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 943, "number": 943, "chapter": "第六章", "type": "判断题", "difficulty": "易", "question": "公平正义是指社会的政治利益、经济利益和其他利益在全体社会成员之间合理、公平分配和占有。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 944, "number": 944, "chapter": "第六章", "type": "判断题", "difficulty": "易", "question": "规则公平是指对所有人适用同一规则和标准，不得因人而异。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 945, "number": 945, "chapter": "第六章", "type": "判断题", "difficulty": "易", "question": "救济公平是指为权利受到侵害或处于弱势地位的公民提供平等有效的救济。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 946, "number": 946, "chapter": "第六章", "type": "判断题", "difficulty": "易", "question": "司法救济公平指的是司法要公正对待每一个当事人，致力于实现司法公正。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 947, "number": 947, "chapter": "第六章", "type": "判断题", "difficulty": "易", "question": "养成公平正义思维，要求增强实现公平正义的责任感，为促进全社会的公平正义而奋斗。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 948, "number": 948, "chapter": "第六章", "type": "判断题", "difficulty": "难", "question": "行政机关是否能够有效地保护公民权利，直接反映出一个国家的权利保障状况。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 949, "number": 949, "chapter": "第六章", "type": "判断题", "difficulty": "易", "question": "只有严格按照法律程序办事办案，处理结果才可能公正并具有公信力和权威性。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 950, "number": 950, "chapter": "第六章", "type": "判断题", "difficulty": "易", "question": "权利和义务的内容、种类是不同的，其中被法律规定或认可的，称为法律权利和法律义务。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 951, "number": 951, "chapter": "第六章", "type": "判断题", "difficulty": "易", "question": "法律权利是指由一定的社会物质生活条件所制约的行为自由，是法律所允许的权利人为了满足自己的利益而采取的、由其他人的法律义务所保障的法律手段。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 952, "number": 952, "chapter": "第六章", "type": "判断题", "difficulty": "易", "question": "权利的产生、发展和实现，都必须以一定的社会经济条件为基础。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 953, "number": 953, "chapter": "第六章", "type": "判断题", "difficulty": "易", "question": "不能脱离一个国家或地区的经济社会发展阶段和水平空谈权利及其实现。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 954, "number": 954, "chapter": "第六章", "type": "判断题", "difficulty": "易", "question": "同样一种权利，在不同的社会制度下和不同的国家法律中表现形式有所不同。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 955, "number": 955, "chapter": "第六章", "type": "判断题", "difficulty": "易", "question": "资本主义法律规定私有财产神圣不可侵犯，而社会主义法律首先规定公共财产神圣不可侵犯，同时规定公民合法的私有财产不受侵犯。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 956, "number": 956, "chapter": "第六章", "type": "判断题", "difficulty": "易", "question": "国家机关行使权力不得任性，公民个人行使法律权利也不得任性。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 957, "number": 957, "chapter": "第六章", "type": "判断题", "difficulty": "易", "question": "法律义务必须由具有法定职权的国家机关依照法律程序设定，其他国家机关不得对公民违法设定法律义务。", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "正确"}, {"id": 958, "number"
