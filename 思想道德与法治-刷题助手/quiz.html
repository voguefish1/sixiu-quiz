let quizMode = 'practice';
let filteredQuestions = [];
let quizQuestions = [];
let currentIndex = 0;
let userAnswers = {};
let quizStarted = false;
let quizFinished = false;

function setMode(mode) {
  quizMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(mode === 'practice' ? 'modePractice' : 'modeExam').classList.add('active');
  document.getElementById('practiceOptions').classList.toggle('hidden', mode === 'exam');
  document.getElementById('startBtn').textContent = mode === 'exam' ? '🚀 开始考试' : '🚀 开始刷题';
}

function init() {
  const chapters = [...new Set(ALL_QUESTIONS.map(q => q.chapter))];
  const types = [...new Set(ALL_QUESTIONS.map(q => q.type))];
  const diffs = ['易', '中', '难'];
  renderChips('chapterChips', chapters, 'chapter');
  renderChips('typeChips', types, 'type');
  renderChips('diffChips', diffs, 'diff');
  updateCount();
}

function renderChips(containerId, items, category) {
  const container = document.getElementById(containerId);
  container.innerHTML = items.map(item => {
    const isActive = selected[category].includes(item);
    return `<span class="chip ${isActive ? 'active' : ''}" data-value="${item}" onclick="toggleChip(this, '${category}')">${item}</span>`;
  }).join('');
  const allBtn = document.createElement('span');
  allBtn.className = 'chip active';
  allBtn.textContent = '全选';
  allBtn.onclick = () => toggleAll(containerId, category);
  container.prepend(allBtn);
}

const selected = {
  chapter: [...new Set(ALL_QUESTIONS.map(q => q.chapter))],
  type: ['单选题', '多选题'],
  diff: ['易', '中', '难']
};

function toggleChip(el, category) {
  el.classList.toggle('active');
  updateSelected(category);
  updateCount();
}

function toggleAll(containerId, category) {
  const container = document.getElementById(containerId);
  const chips = container.querySelectorAll('.chip:not(:first-child)');
  const allActive = [...chips].every(c => c.classList.contains('active'));
  chips.forEach(c => c.classList.toggle('active', !allActive));
  updateSelected(category);
  updateCount();
}

function updateSelected(category) {
  const container = document.getElementById(
    category === 'chapter' ? 'chapterChips' : category === 'type' ? 'typeChips' : 'diffChips'
  );
  const activeChips = container.querySelectorAll('.chip.active:not(:first-child)');
  selected[category] = [...activeChips].map(c => c.dataset.value);
}

function updateCount() {
  const filtered = ALL_QUESTIONS.filter(q =>
    selected.chapter.includes(q.chapter) &&
    selected.type.includes(q.type) &&
    selected.diff.includes(q.difficulty)
  );
  document.getElementById('questionCount').textContent = `共 ${filtered.length} 题`;
}

function startQuiz() {
  filteredQuestions = ALL_QUESTIONS.filter(q =>
    selected.chapter.includes(q.chapter) &&
    selected.type.includes(q.type) &&
    selected.diff.includes(q.difficulty)
  );
  if (filteredQuestions.length === 0) { alert('请至少选择一道题目！'); return; }
  
  quizQuestions = [...filteredQuestions];
  const shouldRandom = quizMode === 'exam' ? true : document.getElementById('randomOrder').checked;
  if (shouldRandom) {
    for (let i = quizQuestions.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [quizQuestions[i], quizQuestions[j]] = [quizQuestions[j], quizQuestions[i]];
    }
  }
  
  currentIndex = 0;
  userAnswers = {};
  quizStarted = true;
  quizFinished = false;
  
  document.getElementById('selectScreen').classList.add('hidden');
  document.getElementById('quizScreen').classList.remove('hidden');
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('examBanner').classList.toggle('hidden', quizMode !== 'exam');
  document.getElementById('quizSidebar').classList.toggle('hidden', quizMode !== 'exam');
  document.getElementById('endBtn').textContent = quizMode === 'exam' ? '📮 交卷' : '🏁 提前结束';
  
  renderQuestion();
  if (quizMode === 'exam') renderNavPanel();
}

function renderQuestion() {
  if (currentIndex >= quizQuestions.length) {
    if (quizMode === 'exam') examSubmit();
    else showResults();
    return;
  }
  
  const q = quizQuestions[currentIndex];
  const isMulti = q.type === '多选题';
  const isExam = quizMode === 'exam';
  
  document.getElementById('qChapter').textContent = q.chapter;
  document.getElementById('qType').textContent = q.type;
  const diffEl = document.getElementById('qDiff');
  diffEl.textContent = q.difficulty;
  diffEl.className = 'badge ' + (q.difficulty === '易' ? 'badge-easy' : q.difficulty === '中' ? 'badge-medium' : 'badge-hard');
  
  document.getElementById('qProgress').textContent = `${currentIndex + 1} / ${quizQuestions.length}`;
  document.getElementById('progressFill').style.width = `${(currentIndex / quizQuestions.length) * 100}%`;
  document.getElementById('qNumber').textContent = `第 ${currentIndex + 1} 题`;
  document.getElementById('qText').textContent = q.question;
  document.getElementById('multiHint').classList.toggle('hidden', !isMulti);
  
  const container = document.getElementById('optionsContainer');
  const prevAnswer = userAnswers[q.id];
  const isAnswered = !!prevAnswer;
  const showFeedback = !isExam && isAnswered;
  
  container.innerHTML = q.options.map(opt => {
    let cls = 'option';
    if (showFeedback) {
      cls += ' disabled';
      if (prevAnswer.includes(opt.label))
        cls += q.answer.includes(opt.label) ? ' correct' : ' wrong';
      else if (q.answer.includes(opt.label))
        cls += ' show-correct';
    }
    
    const clickHandler = showFeedback ? '' :
      (isMulti ? 'toggleMultiOption(this)' : "submitSingleAnswer('" + opt.label + "')");
    
    return `<div class="${cls}" data-label="${opt.label}" onclick="${clickHandler}">
      <span class="option-label">${opt.label}</span>
      <span class="option-text">${opt.text}</span>
    </div>`;
  }).join('');
  
  if (isMulti && !showFeedback && prevAnswer) {
    container.querySelectorAll('.option').forEach(el => {
      if (prevAnswer.includes(el.dataset.label)) el.classList.add('selected');
    });
  }
  
  const fb = document.getElementById('feedback');
  if (showFeedback) {
    const correct = isAnswerCorrect(q, prevAnswer);
    fb.className = 'feedback ' + (correct ? 'correct' : 'wrong');
    fb.innerHTML = correct
      ? '✅ 回答正确！'
      : `❌ 回答错误！你选择了：<span style="text-decoration:line-through;color:#ea4335;">${prevAnswer.join('') || '（未作答）'}</span>，正确答案是：<strong>${q.answer}</strong>`;
  } else {
    fb.className = 'feedback';
    fb.innerHTML = '';
  }
  
  document.getElementById('prevBtn').disabled = currentIndex === 0;
  
  if (isExam) {
    document.getElementById('submitBtn').classList.toggle('hidden', !isMulti || isAnswered);
    document.getElementById('nextBtn').classList.toggle('hidden', !isAnswered);
    if (isAnswered) {
      document.getElementById('nextBtn').textContent = (currentIndex >= quizQuestions.length - 1) ? '🏁 查看结果' : '下一题 ➡';
    }
  } else {
    document.getElementById('submitBtn').classList.toggle('hidden', !isMulti || isAnswered);
    document.getElementById('nextBtn').classList.toggle('hidden', !isAnswered);
    document.getElementById('nextBtn').textContent = (currentIndex >= quizQuestions.length - 1 && isAnswered) ? '🏁 查看结果' : '下一题 ➡';
  }
  
  if (isExam) renderNavPanel();
  window.scrollTo(0, 0);
}

function renderNavPanel() {
  const grid = document.getElementById('navGrid');
  let html = '';
  for (let i = 0; i < quizQuestions.length; i++) {
    const answered = !!userAnswers[quizQuestions[i].id];
    let cls = 'nav-dot';
    if (i === currentIndex) cls += ' current';
    if (answered) cls += ' answered';
    html += `<div class="${cls}" onclick="jumpTo(${i})">${i + 1}</div>`;
  }
  grid.innerHTML = html;
  document.getElementById('navAnswered').textContent = quizQuestions.filter(q => !!userAnswers[q.id]).length;
  document.getElementById('navUnanswered').textContent = quizQuestions.filter(q => !userAnswers[q.id]).length;
}

function jumpTo(index) {
  if (index === currentIndex) return;
  const q = quizQuestions[currentIndex];
  if (q.type === '多选题' && !userAnswers[q.id]) {
    const selectedEls = document.querySelectorAll('#optionsContainer .option.selected');
    if (selectedEls.length > 0) userAnswers[q.id] = [...selectedEls].map(el => el.dataset.label);
  }
  currentIndex = index;
  renderQuestion();
}

function submitSingleAnswer(label) {
  const q = quizQuestions[currentIndex];
  userAnswers[q.id] = [label];
  if (quizMode === 'exam') {
    if (currentIndex >= quizQuestions.length - 1) examSubmit();
    else { currentIndex++; renderQuestion(); }
  } else renderQuestion();
}

function toggleMultiOption(el) { el.classList.toggle('selected'); }

function submitAnswer() {
  const q = quizQuestions[currentIndex];
  const selectedEls = document.querySelectorAll('#optionsContainer .option.selected');
  const labels = [...selectedEls].map(el => el.dataset.label);
  if (labels.length === 0) { alert('请至少选择一个选项！'); return; }
  userAnswers[q.id] = labels;
  if (quizMode === 'exam') {
    if (currentIndex >= quizQuestions.length - 1) examSubmit();
    else { currentIndex++; renderQuestion(); }
  } else renderQuestion();
}

function nextQuestion() {
  if (currentIndex >= quizQuestions.length - 1) showResults();
  else { currentIndex++; renderQuestion(); }
}

function prevQuestion() {
  if (currentIndex > 0) {
    const q = quizQuestions[currentIndex];
    if (q.type === '多选题' && !userAnswers[q.id]) {
      const selectedEls = document.querySelectorAll('#optionsContainer .option.selected');
      if (selectedEls.length > 0) userAnswers[q.id] = [...selectedEls].map(el => el.dataset.label);
    }
    currentIndex--;
    renderQuestion();
  }
}

function isAnswerCorrect(q, userAns) {
  if (!userAns || userAns.length === 0) return false;
  const correct = q.answer.split('').filter(c => c.trim());
  const user = [...userAns].sort();
  return JSON.stringify(correct.sort()) === JSON.stringify(user);
}

function examSubmit() {
  quizFinished = true;
  quizQuestions.forEach(q => { if (!userAnswers[q.id]) userAnswers[q.id] = []; });
  document.getElementById('quizScreen').classList.add('hidden');
  document.getElementById('resultScreen').classList.remove('hidden');
  document.getElementById('tabAllAnswers').classList.remove('hidden');
  switchTab('summary');
}

function endQuiz() {
  if (quizMode === 'exam') {
    const unanswered = quizQuestions.filter(q => !userAnswers[q.id]).length;
    let msg = unanswered > 0
      ? `还有 ${unanswered} 题未作答，未答题目将视为错误。\n确定交卷吗？`
      : '确定交卷吗？交卷后将无法修改答案。';
    if (!confirm(msg)) return;
    examSubmit();
  } else {
    const unanswered = quizQuestions.filter(q => !userAnswers[q.id]).length;
    if (unanswered > 0) {
      if (!confirm(`还有 ${unanswered} 题未作答，确定要结束吗？\n未作答的题目将视为错误。`)) return;
    }
    quizFinished = true;
    showResults();
  }
}

function showResults() {
  quizFinished = true;
  document.getElementById('quizScreen').classList.add('hidden');
  document.getElementById('resultScreen').classList.remove('hidden');
  quizQuestions.forEach(q => { if (!userAnswers[q.id]) userAnswers[q.id] = []; });
  document.getElementById('tabAllAnswers').classList.toggle('hidden', quizMode !== 'exam');
  switchTab('summary');
}

function switchTab(tab) {
  document.querySelectorAll('#resultTabs .tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
  const content = document.getElementById('tabContent');
  if (tab === 'summary') renderSummary(content);
  else if (tab === 'detail') renderDetail(content);
  else if (tab === 'review') renderReview(content);
  else if (tab === 'allAnswers') renderAllAnswers(content);
}

function renderSummary(container) {
  const total = quizQuestions.length;
  let correct = 0;
  quizQuestions.forEach(q => { if (isAnswerCorrect(q, userAnswers[q.id])) correct++; });
  const wrong = total - correct;
  const rate = total > 0 ? Math.round((correct / total) * 100) : 0;
  let circleColor, emoji;
  if (rate >= 90) { circleColor = '#34a853'; emoji = '🎉'; }
  else if (rate >= 70) { circleColor = '#fb8c00'; emoji = '📖'; }
  else if (rate >= 60) { circleColor = '#f9ab00'; emoji = '💪'; }
  else { circleColor = '#ea4335'; emoji = '📚'; }
  
  container.innerHTML = `<div class="result-summary">
    <div class="score-circle" style="background: ${circleColor};">${emoji}<br>${rate}%</div>
    <div class="score-label">
      共 <strong>${total}</strong> 题 |
      ✅ 正确 <strong>${correct}</strong> 题 |
      ❌ 错误 <strong>${wrong}</strong> 题
    </div>
  </div>`;
}

function renderDetail(container) {
  const chapterStats = {}, typeStats = {}, diffStats = {};
  quizQuestions.forEach(q => {
    const correct = isAnswerCorrect(q, userAnswers[q.id]);
    if (!chapterStats[q.chapter]) chapterStats[q.chapter] = { total: 0, correct: 0 };
    chapterStats[q.chapter].total++; if (correct) chapterStats[q.chapter].correct++;
    if (!typeStats[q.type]) typeStats[q.type] = { total: 0, correct: 0 };
    typeStats[q.type].total++; if (correct) typeStats[q.type].correct++;
    if (!diffStats[q.difficulty]) diffStats[q.difficulty] = { total: 0, correct: 0 };
    diffStats[q.difficulty].total++; if (correct) diffStats[q.difficulty].correct++;
  });
  
  function rateClass(r) { return r >= 90 ? 'rate-good' : r >= 70 ? 'rate-mid' : 'rate-bad'; }
  function renderTable(title, stats) {
    let html = `<h4 style="margin-top:20px;margin-bottom:10px;color:#333;">${title}</h4><table class="analysis-table"><tr><th>类别</th><th>正确/总题数</th><th>正确率</th><th>进度条</th></tr>`;
    for (const [key, s] of Object.entries(stats)) {
      const r = s.total > 0 ? Math.round((s.correct / s.total) * 100) : 0;
      html += `<tr><td>${key}</td><td>${s.correct} / ${s.total}</td><td class="${rateClass(r)}">${r}%</td><td><div style="height:6px;background:#e0e0e0;border-radius:3px;width:150px;"><div style="height:100%;width:${r}%;background:${r>=90?'#34a853':r>=70?'#fb8c00':'#ea4335'};border-radius:3px;"></div></div></td></tr>`;
    }
    html += '</table>'; return html;
  }
  container.innerHTML = renderTable('📖 按章节分析', chapterStats) + renderTable('📝 按题型分析', typeStats) + renderTable('🎯 按难度分析', diffStats);
}

function renderReview(container) {
  const wrongQuestions = quizQuestions.filter(q => !isAnswerCorrect(q, userAnswers[q.id]));
  if (wrongQuestions.length === 0) { container.innerHTML = '<div style="text-align:center;padding:40px;color:#888;">🎉 全部正确，太棒了！</div>'; return; }
  
  let html = `<p style="margin-bottom:16px;color:#888;">共 <strong>${wrongQuestions.length}</strong> 道错题（含未作答）</p>`;
  wrongQuestions.forEach((q, i) => {
    const userAns = userAnswers[q.id] || [];
    const userStr = userAns.length > 0 ? userAns.join('') : '（未作答）';
    html += `<div class="answer-card wrong">
      <div style="display:flex;gap:8px;margin-bottom:4px;align-items:center;">
        <span class="badge badge-chapter">${q.chapter}</span><span class="badge badge-type">${q.type}</span>
        <span>❌</span>
      </div>
      <div style="font-weight:600;margin-bottom:6px;">${i+1}. ${q.question}</div>
      <div style="font-size:14px;">你的答案：<span style="color:#d93025;text-decoration:line-through;">${userStr}</span></div>
      <div style="font-size:14px;">正确答案：<span style="color:#137333;">${q.answer}</span></div>
      <div class="ans-options" style="margin-top:8px;">
        ${q.options.map(o => {
          const inUser = userAns.includes(o.label);
          const inCorrect = q.answer.includes(o.label);
          let cls = 'ans-opt';
          if (inUser && inCorrect) cls += ' both';
          else if (inUser) cls += ' your-pick';
          else if (inCorrect) cls += ' correct-pick';
          return `<span class="${cls}">${o.label}. ${o.text}</span>`;
        }).join('')}
      </div>
    </div>`;
  });
  container.innerHTML = html + `<div style="text-align:center;margin-top:20px;"><button class="btn btn-primary" onclick="retryWrong()">🔄 重新练习错题 (${wrongQuestions.length}题)</button></div>`;
}

function renderAllAnswers(container) {
  let html = '<p style="margin-bottom:16px;color:#888;">以下为本次测试所有题目的答案对照，绿色边框=正确，红色边框=错误</p>';
  quizQuestions.forEach((q, i) => {
    const userAns = userAnswers[q.id] || [];
    const correct = isAnswerCorrect(q, userAns);
    const userStr = userAns.length > 0 ? userAns.join('') : '（未作答）';
    html += `<div class="answer-card ${correct ? 'correct' : 'wrong'}">
      <div style="display:flex;gap:8px;margin-bottom:4px;align-items:center;">
        <span class="badge badge-chapter">${q.chapter}</span><span class="badge badge-type">${q.type}</span>
        <span style="font-size:12px;color:#888;">#${i+1}</span>
        <span>${correct ? '✅' : '❌'}</span>
      </div>
      <div style="font-weight:600;margin-bottom:6px;">${q.question}</div>
      <div style="display:flex;gap:16px;font-size:14px;margin-top:8px;flex-wrap:wrap;">
        <span>你的答案：<strong style="color:${correct?'#137333':'#c5221f'};">${userStr}</strong></span>
        <span>正确答案：<strong style="color:#137333;">${q.answer}</strong></span>
      </div>
      <div class="ans-options">
        ${q.options.map(o => {
          const inUser = userAns.includes(o.label);
          const inCorrect = q.answer.includes(o.label);
          let cls = 'ans-opt';
          if (inUser && inCorrect) cls += ' both';
          else if (inUser) cls += ' your-pick';
          else if (inCorrect) cls += ' correct-pick';
          return `<span class="${cls}">${o.label}. ${o.text}</span>`;
        }).join('')}
      </div>
    </div>`;
  });
  container.innerHTML = html;
}

function retryWrong() {
  const wrongQ = quizQuestions.filter(q => !isAnswerCorrect(q, userAnswers[q.id]));
  if (wrongQ.length === 0) { alert('没有错题可以练习！'); return; }
  quizQuestions = wrongQ;
  for (let i = quizQuestions.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [quizQuestions[i], quizQuestions[j]] = [quizQuestions[j], quizQuestions[i]];
  }
  currentIndex = 0; userAnswers = {}; quizFinished = false; quizMode = 'practice';
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('quizScreen').classList.remove('hidden');
  document.getElementById('examBanner').classList.add('hidden');
  document.getElementById('quizSidebar').classList.add('hidden');
  document.getElementById('endBtn').textContent = '🏁 提前结束';
  renderQuestion();
}

init();
</script>
</body>
</html>
